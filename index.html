<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Classification System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px dashed #3498db;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .upload-section:hover {
            background: #ecf0f1;
        }
        #file-input {
            display: none;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin-top: 20px;
            display: none;
            border-radius: 8px;
        }
        .result-card {
            margin-top: 20px;
            padding: 20px;
            background: #e8f8f5;
            border-left: 5px solid #1abc9c;
            border-radius: 4px;
            display: none;
        }
        .result-card h3 {
            margin-top: 0;
            color: #16a085;
        }
        .loading {
            text-align: center;
            font-style: italic;
            color: #7f8c8d;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 AI Garbage Classifier</h1>
    <p style="text-align: center; color: #7f8c8d;">Upload a photo of your trash to get recycling instructions and upcycling ideas!</p>
    
    <div class="upload-section" onclick="document.getElementById('file-input').click()">
        <p>Click here to upload an image</p>
        <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">
    </div>
    
    <div style="text-align: center;">
        <img id="preview" src="#" alt="Image Preview">
        <br>
        <label for="lang-select" style="display:block; margin-top:12px; color:#555;">Response Language</label>
        <select id="lang-select" style="padding:6px 10px; border-radius:4px; border:1px solid #ccc;">
            <option value="en" selected>English</option>
            <option value="zh">中文</option>
        </select>
        <br>
        <button class="btn" id="upload-btn" onclick="classifyImage()" style="display:none;">Classify</button>
    </div>

    <div class="loading" id="loading">Analyzing image and generating instructions...</div>

    <div class="result-card" id="result">
        <h3>Result</h3>
        <p><strong>Category:</strong> <span id="label"></span> (<span id="confidence"></span>)</p>
        <p><strong>Instructions:</strong></p>
        <p id="instructions"></p>
        <p><strong>Upcycling Idea:</strong></p>
        <p id="upcycling"></p>
    </div>
</div>

<script>
    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('upload-btn').style.display = 'inline-block';
                document.getElementById('result').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    }

    async function classifyImage() {
        const fileInput = document.getElementById('file-input');
        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("lang", document.getElementById("lang-select").value);

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        document.getElementById('upload-btn').disabled = true;

        try {
            const response = await fetch("http://localhost:8000/classify", {
                method: "POST",
                body: formData
            });
            
            if (!response.ok) throw new Error("Server error");
            
            const data = await response.json();
            
            document.getElementById('label').innerText = data.label;
            document.getElementById('confidence').innerText = (data.confidence * 100).toFixed(2) + "%";
            document.getElementById('instructions').innerText = data.instructions;
            document.getElementById('upcycling').innerText = data.upcycling;
            
            document.getElementById('result').style.display = 'block';
        } catch (error) {
            alert("An error occurred while classifying the image.");
            console.error(error);
        } finally {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('upload-btn').disabled = false;
        }
    }
</script>

</body>
</html>
